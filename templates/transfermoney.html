<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
	<div class="container">
		<h2>Transfer Money</h2>
		<input type="text" id="payer" placeholder="Enter Payer Address">
		<input type="text" id="payee" placeholder="Enter Payee Address">
		<input type="number" id="amount" placeholder="Enter Amount">
		<button class="btn" onclick="transfer()">Transfer</button>
		<button class="btn" onclick="transaction()">View Transaction</button>

		<form action="/main" method="post">
			<input type="submit" value="Main">
		</form>
		<p id="view_payer"></p >
		<p id="view_payee"></p >
		<p id="view_amount"></p >

		<!-- Web3 and contract interaction -->
		<script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
		<script>
			const contractAddress = "0xd8b934580fcE35a11B58C6D73aDeE468a2833fa8";
			const contractABI = [
				{
					"inputs": [
						{ "internalType": "address", "name": "_payer", "type": "address" },
						{ "internalType": "address", "name": "_payee", "type": "address" },
						{ "internalType": "uint256", "name": "_amount", "type": "uint256" }
					],
					"name": "weixin",
					"outputs": [],
					"stateMutability": "payable",
					"type": "function"
				},
				{
					"inputs": [],
					"name": "checkTransaction",
					"outputs": [
						{ "internalType": "address", "name": "", "type": "address" },
						{ "internalType": "address", "name": "", "type": "address" },
						{ "internalType": "uint256", "name": "", "type": "uint256" }
					],
					"stateMutability": "view",
					"type": "function"
				}
			];
			const web3 = new Web3(Web3.givenProvider);
			const contract = new web3.eth.Contract(contractABI, contractAddress);

			// Transfer money function
			async function transfer() {
				const accounts = await web3.eth.requestAccounts();
				const payer = document.getElementById('payer').value;
				const payee = document.getElementById('payee').value;
				const amount = document.getElementById('amount').value;
				console.log(payer, payee, amount);
				console.log("accounts[0] " + accounts[0]);
				await contract.methods.weixin(payer, payee, amount).send({ from: accounts[0] });
			}

			// View transaction function
			async function transaction() {
				const result = await contract.methods.checkTransaction().call();
				document.getElementById('view_payer').innerText = "Payer: " + result[0];
				document.getElementById('view_payee').innerText = "Payee: " + result[1];
				document.getElementById('view_amount').innerText = "Amount: " + result[2];
			}
		</script>
	</div>
</body>
